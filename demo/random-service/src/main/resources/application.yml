spring:
  application:
    name: random-service
server:
  port: ${SERVER_PORT:8082}
management:
  endpoints:
    web:
      exposure:
        include: health,info
eureka:
  client:
    jersey:
      enabled: false
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    webclient:
      enabled: false
  instance:
    prefer-ip-address: true
