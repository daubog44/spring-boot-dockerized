version: "3"

vars:
  JAVA_HOME_PATH: "C:/Program Files/Microsoft/jdk-25.0.2.10-hotspot"

tasks:
  run-eureka:
    desc: Run the Eureka server locally
    cmds:
      - task: run-module
        vars:
          MODULE: "naming-server"

  run-tourist:
    desc: Run the tourist wrapper locally
    cmds:
      - task: run-module
        vars:
          MODULE: "tourist-service"

  run-random:
    desc: Run the random service locally
    cmds:
      - task: run-module
        vars:
          MODULE: "random-service"

  run-store:
    desc: Run the store service locally
    cmds:
      - task: run-module
        vars:
          MODULE: "store-service"

  run-ui:
    desc: Run the UI locally
    cmds:
      - task: run-module
        vars:
          MODULE: "event-ui"

  run-db:
    desc: Start only PostgreSQL via Docker
    dir: demo
    cmds:
      - docker compose up -d postgres

  docker-up:
    desc: Build and start the full exam stack
    dir: demo
    cmds:
      - docker compose build eureka-server
      - docker compose build tourist-service
      - docker compose build random-service
      - docker compose build store-service
      - docker compose build ui-service
      - docker compose up -d

  docker-down:
    desc: Stop the full exam stack
    dir: demo
    cmds:
      - docker compose down -v --remove-orphans

  docker-logs:
    desc: Tail compose logs
    dir: demo
    cmds:
      - docker compose logs -f

  build:
    desc: Package all Maven modules
    dir: demo
    cmds:
      - '{{if eq OS "windows"}}cmd /c "set JAVA_HOME={{.JAVA_HOME_PATH}}&& mvnw.cmd clean package -Dmaven.test.skip=true"{{else}}JAVA_HOME="{{.JAVA_HOME_PATH}}" ./mvnw clean package -Dmaven.test.skip=true{{end}}'

  clean-ports:
    desc: Kill Java processes
    cmds:
      - '{{if eq OS "windows"}}cmd /c "taskkill /F /IM java.exe /T 2>nul || ver >nul"{{else}}pkill -f java || true{{end}}'

  run-module:
    internal: true
    dir: 'demo/{{.MODULE}}'
    cmds:
      - '{{if eq OS "windows"}}cmd /c "set JAVA_HOME={{.JAVA_HOME_PATH}}&& ..\\mvnw.cmd -f ..\\pom.xml -pl {{.MODULE}} -am install -Dmaven.test.skip=true"{{else}}JAVA_HOME="{{.JAVA_HOME_PATH}}" ../mvnw -f ../pom.xml -pl {{.MODULE}} -am install -Dmaven.test.skip=true{{end}}'
      - '{{if eq OS "windows"}}cmd /c "set JAVA_HOME={{.JAVA_HOME_PATH}}&& ..\\mvnw.cmd spring-boot:run"{{else}}JAVA_HOME="{{.JAVA_HOME_PATH}}" ../mvnw spring-boot:run{{end}}'
